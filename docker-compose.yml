# CRM Envigado - piloto local
# Levanta: EspoCRM + PostgreSQL + proceso en segundo plano del CRM

services:

  espocrm-db:
    image: postgres:16
    container_name: espocrm-db
    environment:
      POSTGRES_DB: espocrm
      POSTGRES_USER: espocrm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-espocrm_local_2026}
    ports:
      - "5433:5432"
    volumes:
      - espocrm-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espocrm -d espocrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    ports:
      - "8080:80"
    environment:
      ESPOCRM_DATABASE_PLATFORM: Postgresql
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_NAME: espocrm
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: ${DB_PASSWORD:-espocrm_local_2026}
      ESPOCRM_ADMIN_USERNAME: admin
      ESPOCRM_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_local_2026}
      ESPOCRM_SITE_URL: "http://localhost:8080"
    volumes:
      - espocrm-data:/var/www/html
    depends_on:
      espocrm-db:
        condition: service_healthy
    restart: unless-stopped

  espocrm-daemon:
    image: espocrm/espocrm
    container_name: espocrm-daemon
    volumes:
      - espocrm-data:/var/www/html
    entrypoint: docker-daemon.sh
    depends_on:
      - espocrm
    restart: unless-stopped

  formulario-web:
    image: nginx:alpine
    container_name: formulario-web
    ports:
      - "8082:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/formulario.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - espocrm
    restart: unless-stopped

volumes:
  espocrm-db-data:
  espocrm-data:
