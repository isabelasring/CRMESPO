<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporte ambiental — Envigado</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <main class="pagina">
    <header class="encabezado">
      <h1>Reporte ambiental</h1>
      <p class="subtitulo">Campos del CRM (tipo de caso, barrio, etc.).</p>
    </header>

    <form id="form-reporte" class="formulario" novalidate>
      <p id="cargando" class="cargando">Cargando campos desde el CRM…</p>
      <div id="campos-crm"></div>
      <button type="submit" id="btn-enviar" disabled>Enviar reporte</button>
      <p id="mensaje" class="mensaje" hidden></p>
    </form>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
